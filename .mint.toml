# .mint.toml — mint configuration. Only non-default overrides are set here;
# every other key uses mint's compiled defaults. Run `mint setup` for the full
# key reference.

# Tooling/workflow artifacts (not shipped product source) — kept out of the
# AI notes/commit diff so release notes and commit messages describe the CLI,
# not workflow specs, agent definitions, or task-tracking state.
diff_exclude = [
    '.workflows/**',  # workflow specs/plans/knowledge (1.5k markdown files)
    '.claude/**',     # Claude Code agents, skills, settings
    '.agntc/**',      # agent tooling manifest
    '.tick/**',       # task-tracking state (multi-MB jsonl)
]
