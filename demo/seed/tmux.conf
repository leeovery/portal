# Demo tmux: a slim dark status bar that matches Portal's Modern Vivid canvas, so
# the hand-off from picker to live session stays on-palette. The stock green tmux
# bar clashes hard with the dark theme.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-features ",*:RGB"

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#0b0c14,fg=#565f89"
set -g status-left "#[fg=#bb9af7,bold] portal #[default]"
set -g status-left-length 20
set -g status-right "#[fg=#7aa2f7]#S #[fg=#3b4261]· #[fg=#565f89]%H:%M "
set -g status-right-length 40
set -g window-status-format "#[fg=#565f89] #W "
set -g window-status-current-format "#[fg=#c0caf5,bold] #W "
set -g pane-border-style "fg=#1f2335"
set -g pane-active-border-style "fg=#3d59a1"
set -g message-style "bg=#0b0c14,fg=#c0caf5"
